version: "3.8"

services:
  polymarket-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-copy-bot
    restart: unless-stopped
    env_file:
      - .env
    # Resource limits (adjust based on GCP VM size)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Graceful shutdown (SIGTERM → bot prints final report)
    stop_grace_period: 15s
